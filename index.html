  <!-- GSAP + ScrollTrigger -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>

  <script>
    // register plugin
    gsap.registerPlugin(ScrollTrigger);

    const solarPaths = document.querySelectorAll("#solarSvg .solarPath");
    const planets = document.querySelectorAll("#solarSvg .planetGroup");

    const tl = gsap.timeline({
      scrollTrigger: {
        trigger: "#solarSvg",
        start: "top 60%",
        end: "top 10%",
        scrub: true,
        // markers: true
      }
    });

    tl.from(solarPaths, {
      scale: 0,
      transformOrigin: "center center",
      stagger: {
        each: 0.15
      }
    });

    tl.from(planets, {
      opacity: 0,
      stagger: 0.12,
      // ease: "power2.out"
    });

    // floating animation (loop, not tied to scroll)
    gsap.to(planets, {
      y: "+=15",
      // x: "+=5",
      duration: 2,
      ease: "sine.inOut",
      repeat: -1,
      yoyo: true,
      stagger: {
        each: 0.2,
        from: "random"
      }
    });

  </script>
